<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual del Piloto — Visor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --toolbar-bg: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: var(--radius);
      padding: 0.45rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: #4b5563; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-accent {
      background: var(--accent);
    }
    .btn-accent:hover { background: var(--accent-hover); }

    .page-nav {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .page-input {
      width: 3.5rem;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.4rem 0.5rem;
      font-size: 0.85rem;
      text-align: center;
    }

    .page-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .page-sep {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .zoom-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      min-width: 3rem;
      text-align: center;
    }

    .back-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 0.4rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .back-btn:hover { background: rgba(99,102,241,0.15); }

    .viewer {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1.5rem;
      background: #111827;
    }

    #pdf-canvas {
      display: block;
      box-shadow: 0 4px 32px rgba(0,0,0,0.6);
      border-radius: 4px;
      max-width: 100%;
    }

    .status {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--toolbar-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: none;
      z-index: 100;
    }

    .status.show { display: block; }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .spinner {
      width: 2rem;
      height: 2rem;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="back-btn" onclick="history.back()">&#8592; Volver</button>
    <span class="toolbar-title">Manual del Piloto de Conocimientos Aeronáuticos</span>

    <div class="page-nav">
      <button class="btn" id="btn-prev" onclick="changePage(-1)" disabled>&#8249;</button>
      <input class="page-input" id="page-input" type="number" min="1" value="1"
             onchange="goToPage(this.value)" onkeydown="if(event.key==='Enter')goToPage(this.value)">
      <span class="page-sep">de <span id="total-pages">—</span></span>
      <button class="btn" id="btn-next" onclick="changePage(1)" disabled>&#8250;</button>
    </div>

    <div class="zoom-controls">
      <button class="btn" onclick="changeZoom(-0.25)">&#8722;</button>
      <span class="zoom-label" id="zoom-label">150%</span>
      <button class="btn" onclick="changeZoom(0.25)">&#43;</button>
      <button class="btn" onclick="fitToWidth()">Ajustar</button>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <span>Cargando PDF…</span>
    </div>
    <canvas id="pdf-canvas" style="display:none;"></canvas>
  </div>

  <div class="status" id="status"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const PDF_PATH = 'files/FAA_Manual_del_piloto_de_conocimientos_a.pdf';

    const params = new URLSearchParams(window.location.search);
    let currentPage = Math.max(1, parseInt(params.get('page')) || 1);
    let totalPages = 0;
    let scale = 1.5;
    let pdfDoc = null;
    let rendering = false;
    let pendingPage = null;

    const canvas  = document.getElementById('pdf-canvas');
    const ctx     = canvas.getContext('2d');
    const loading = document.getElementById('loading');
    const status  = document.getElementById('status');

    function showStatus(msg, duration = 1500) {
      status.textContent = msg;
      status.classList.add('show');
      setTimeout(() => status.classList.remove('show'), duration);
    }

    function updateNav() {
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
      document.getElementById('page-input').value = currentPage;
      document.getElementById('total-pages').textContent = totalPages;
      document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
    }

    function renderPage(num) {
      if (rendering) {
        pendingPage = num;
        return;
      }
      rendering = true;

      pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale });
        canvas.width  = viewport.width;
        canvas.height = viewport.height;

        const renderContext = { canvasContext: ctx, viewport };
        return page.render(renderContext).promise;
      }).then(() => {
        rendering = false;
        loading.style.display = 'none';
        canvas.style.display = 'block';

        if (pendingPage !== null) {
          const next = pendingPage;
          pendingPage = null;
          currentPage = next;
          updateNav();
          renderPage(next);
        }

        // Scroll viewer to top on page change
        document.getElementById('viewer').scrollTo(0, 0);
      }).catch(err => {
        rendering = false;
        console.error(err);
      });
    }

    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage < 1 || newPage > totalPages) return;
      currentPage = newPage;
      updateNav();
      renderPage(currentPage);
    }

    function goToPage(val) {
      const num = parseInt(val);
      if (isNaN(num) || num < 1 || num > totalPages) {
        document.getElementById('page-input').value = currentPage;
        return;
      }
      currentPage = num;
      updateNav();
      renderPage(currentPage);
    }

    function changeZoom(delta) {
      scale = Math.min(4, Math.max(0.5, scale + delta));
      document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
      renderPage(currentPage);
    }

    function fitToWidth() {
      const viewer = document.getElementById('viewer');
      const availWidth = viewer.clientWidth - 48;
      pdfDoc.getPage(currentPage).then(page => {
        const vp = page.getViewport({ scale: 1 });
        scale = availWidth / vp.width;
        document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
        renderPage(currentPage);
      });
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
    });

    // Load PDF
    pdfjsLib.getDocument(PDF_PATH).promise.then(pdf => {
      pdfDoc = pdf;
      totalPages = pdf.numPages;
      currentPage = Math.min(currentPage, totalPages);
      updateNav();
      renderPage(currentPage);
    }).catch(err => {
      loading.innerHTML = `
        <div style="text-align:center;color:#ef4444;">
          <div style="font-size:2rem;margin-bottom:0.5rem;">&#9888;</div>
          <div style="font-weight:600;margin-bottom:0.5rem;">No se pudo cargar el PDF</div>
          <div style="font-size:0.85rem;color:#94a3b8;">${err.message}</div>
        </div>`;
    });
  </script>
</body>
</html>
