<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjetas de Estudio</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --card-border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --correct: #22c55e;
      --correct-bg: rgba(34, 197, 94, 0.15);
      --incorrect: #ef4444;
      --incorrect-bg: rgba(239, 68, 68, 0.15);
      --option-bg: #273548;
      --option-hover: #334155;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1.25rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid var(--card-border);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .progress-bar-container {
      width: 100%;
      max-width: 600px;
      margin: 1.5rem auto 0;
      padding: 0 1.5rem;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--card-border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 600px;
      padding: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      width: 100%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .category {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .question {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option-btn {
      background: var(--option-bg);
      color: var(--text);
      border: 2px solid transparent;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .option-btn:hover:not(:disabled) {
      background: var(--option-hover);
      transform: translateX(4px);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: var(--card-border);
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .option-btn.correct {
      background: var(--correct-bg);
      border-color: var(--correct);
    }

    .option-btn.correct .option-letter {
      background: var(--correct);
      color: #fff;
    }

    .option-btn.incorrect {
      background: var(--incorrect-bg);
      border-color: var(--incorrect);
    }

    .option-btn.incorrect .option-letter {
      background: var(--incorrect);
      color: #fff;
    }

    .feedback {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.95rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .feedback.show {
      display: flex;
    }

    .feedback.correct {
      background: var(--correct-bg);
      color: var(--correct);
    }

    .feedback.incorrect {
      background: var(--incorrect-bg);
      color: var(--incorrect);
    }

    .reason {
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      background: rgba(99, 102, 241, 0.1);
      border-left: 3px solid var(--accent);
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 400;
      line-height: 1.5;
      display: none;
    }

    .reason.show {
      display: block;
    }

    .reason-label {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .next-btn {
      margin-top: 1.25rem;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      display: none;
    }

    .next-btn:hover {
      background: var(--accent-hover);
    }

    .next-btn.show {
      display: block;
    }

    /* Results screen */
    .results {
      text-align: center;
    }

    .results-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .results h2 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .results .score {
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent);
      margin: 1rem 0;
    }

    .results .score-detail {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .restart-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 1rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .restart-btn:hover {
      background: var(--accent-hover);
    }

    /* Category picker */
    .picker {
      width: 100%;
      animation: fadeIn 0.3s ease;
    }

    .picker h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .dropdown {
      position: relative;
      width: 100%;
    }

    .dropdown-toggle {
      width: 100%;
      background: var(--option-bg);
      color: var(--text);
      border: 2px solid var(--card-border);
      border-radius: var(--radius);
      padding: 0.9rem 1.15rem;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .dropdown-toggle:hover {
      background: var(--option-hover);
    }

    .dropdown.open .dropdown-toggle {
      border-color: var(--accent);
    }

    .dropdown-toggle .chevron {
      color: var(--text-muted);
      transition: transform 0.15s ease;
    }

    .dropdown.open .dropdown-toggle .chevron {
      transform: rotate(180deg);
    }

    .dropdown-panel {
      display: none;
      margin-top: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 0.4rem;
      max-height: 320px;
      overflow-y: auto;
    }

    .dropdown.open .dropdown-panel {
      display: block;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s ease;
      user-select: none;
    }

    .dropdown-item:hover {
      background: var(--option-hover);
    }

    .dropdown-item input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .dropdown-item .item-label {
      flex: 1;
      font-size: 0.95rem;
    }

    .dropdown-item .item-count {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 600;
      background: var(--card-border);
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
    }

    .dropdown-divider {
      height: 1px;
      background: var(--card-border);
      margin: 0.3rem 0;
    }

    .count-select {
      width: 100%;
      background: var(--option-bg);
      color: var(--text);
      border: 2px solid var(--card-border);
      border-radius: var(--radius);
      padding: 0.9rem 1.15rem;
      font-size: 0.95rem;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%2394a3b8' d='M6 8L0 0h12z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 1.15rem center;
      padding-right: 2.5rem;
    }

    .count-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .start-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .start-btn:hover {
      background: var(--accent-hover);
    }

    .start-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* Study topics (end-of-quiz) */
    .study-list {
      text-align: left;
      margin-top: 1.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--card-border);
    }

    .study-list h3 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .study-item {
      background: var(--option-bg);
      border-left: 3px solid var(--incorrect);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.75rem;
    }

    .study-item .study-topic {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .study-item .study-question {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 0.5rem;
    }

    .study-item .study-answer {
      font-size: 0.88rem;
      color: var(--correct);
      margin-bottom: 0.5rem;
    }

    .study-item .study-reason {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .study-item .study-ref {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .study-item .study-ref strong {
      color: var(--text);
      font-style: normal;
    }

    .pages-ref {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .pages-ref.show {
      display: flex;
    }

    .pages-ref-label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .page-link {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      color: var(--accent);
      font-style: normal;
      font-weight: 600;
      text-decoration: none;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 4px;
      padding: 0.05rem 0.45rem;
      transition: background 0.15s;
    }

    .page-link:hover {
      background: rgba(99,102,241,0.25);
    }

    .page-link::before {
      content: '📄';
      font-size: 0.7rem;
    }

    /* Figure images */
    .figures {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .figures img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      cursor: zoom-in;
      transition: transform 0.2s ease;
    }

    .figures img:hover {
      transform: scale(1.01);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 95vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 1.5rem 1rem;
      }

      .question {
        font-size: 1.1rem;
      }

      .option-btn {
        padding: 0.85rem 1rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tarjetas de Estudio</h1>
  </header>

  <div class="progress-bar-container">
    <div class="progress-info">
      <span id="progress-text">Pregunta 1 de 10</span>
      <span id="score-text">Correctas: 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
  </div>

  <main id="main"></main>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Figure">
  </div>

  <script>
    let flashcards = [];
    let currentIndex = 0;
    let correctCount = 0;
    let answered = false;
    let shuffledCards = [];
    let selectedCategories = new Set();
    let missedCards = [];
    let questionCount = 50;

    const letters = ['A', 'B', 'C', 'D'];

    // Mapping from category to PHAK (FAA-H-8083-25C) chapter.
    // Page numbers can be added per-card later via an optional `page` field.
    const PHAK_CHAPTERS = {
      'AERODINÁMICA BÁSICA':              { chapter: 5,  title: 'Aerodinámica en Vuelo',              source: 'PHAK (FAA-H-8083-25C)' },
      'INSTRUMENTOS DE VUELO':            { chapter: 8,  title: 'Instrumentos de Vuelo',              source: 'PHAK (FAA-H-8083-25C)' },
      'METEOROLOGÍA':                     { chapter: 12, title: 'Teoría del Tiempo',                  source: 'PHAK (FAA-H-8083-25C)' },
      'NAVEGACIÓN':                       { chapter: 16, title: 'Navegación',                         source: 'PHAK (FAA-H-8083-25C)' },
      'PERFORMANCE':                      { chapter: 11, title: 'Performance de la Aeronave',         source: 'PHAK (FAA-H-8083-25C)' },
      'PROCEDIMIENTOS DE COMUNICACIÓN':   { chapter: 14, title: 'Operaciones de Aeropuerto',          source: 'PHAK / AIM' },
      'PROCEDIMIENTOS Y OPERACIONES':     { chapter: 14, title: 'Operaciones de Aeropuerto',          source: 'PHAK (FAA-H-8083-25C)' },
      'REGLAMENTACIÓN':                   { chapter: null, title: 'Regulaciones (14 CFR Partes 61 y 91)', source: 'FAR/AIM' },
      'SERVICIO METEOROLÓGICO':           { chapter: 13, title: 'Servicios Meteorológicos de Aviación', source: 'PHAK (FAA-H-8083-25C)' },
      'SISTEMAS DE AERONAVES':            { chapter: 7,  title: 'Sistemas de la Aeronave',            source: 'PHAK (FAA-H-8083-25C)' },
      'VUELO EN RUTA':                    { chapter: 15, title: 'Espacio Aéreo',                      source: 'PHAK (FAA-H-8083-25C)' },
      'FRASEOLOGIA AERONAUTICA':          { chapter: 14, title: 'Operaciones de Aeropuerto',          source: 'PHAK / AIM' }
    };

    function handbookRef(category) {
      const info = PHAK_CHAPTERS[category];
      if (!info) return null;
      const chapterPart = info.chapter != null ? `Capítulo ${info.chapter}: ${info.title}` : info.title;
      return { chapterPart, source: info.source };
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function showLoading() {
      document.getElementById('main').innerHTML = `
        <div class="card" style="text-align:center;">
          <div class="question">Cargando tarjetas...</div>
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById('main').innerHTML = `
        <div class="card" style="text-align:center;">
          <div class="question" style="color:var(--incorrect);">Error al cargar las tarjetas</div>
          <p style="color:var(--text-muted);margin-top:1rem;">${msg}</p>
          <button class="restart-btn" style="margin-top:1.5rem;" onclick="loadCards()">Reintentar</button>
        </div>
      `;
    }

    async function loadCards() {
      showLoading();
      try {
        const resp = await fetch('cards.json');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        flashcards = await resp.json();
        showCategoryPicker();
      } catch (err) {
        showError(err.message);
      }
    }

    function getCategories() {
      const map = {};
      flashcards.forEach(c => {
        map[c.category] = (map[c.category] || 0) + 1;
      });
      return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
    }

    function toggleCatDropdown() {
      document.getElementById('cat-dropdown').classList.toggle('open');
    }

    function toggleCategory(cat) {
      if (selectedCategories.has(cat)) {
        selectedCategories.delete(cat);
      } else {
        selectedCategories.add(cat);
      }
      updatePickerUI();
    }

    function selectAllCategories() {
      const cats = getCategories();
      if (selectedCategories.size === cats.length) {
        selectedCategories.clear();
      } else {
        cats.forEach(([cat]) => selectedCategories.add(cat));
      }
      updatePickerUI();
    }

    function onCountChange() {
      const v = document.getElementById('count-select').value;
      questionCount = v === 'all' ? 'all' : parseInt(v, 10);
      updatePickerUI();
    }

    function pickerTargetCount() {
      const available = flashcards.filter(c => selectedCategories.has(c.category)).length;
      if (questionCount === 'all') return available;
      return Math.min(available, questionCount);
    }

    function updatePickerUI() {
      const cats = getCategories();
      const allSelected = cats.length > 0 && selectedCategories.size === cats.length;

      const allCb = document.getElementById('cat-all');
      if (allCb) allCb.checked = allSelected;
      document.querySelectorAll('.dropdown-item input[data-cat]').forEach(cb => {
        cb.checked = selectedCategories.has(cb.dataset.cat);
      });

      const label = document.getElementById('cat-label');
      if (label) {
        if (selectedCategories.size === 0) {
          label.textContent = 'Selecciona materias';
        } else if (allSelected) {
          label.textContent = `Todas las materias (${cats.length})`;
        } else if (selectedCategories.size === 1) {
          label.textContent = [...selectedCategories][0];
        } else {
          label.textContent = `${selectedCategories.size} materias seleccionadas`;
        }
      }

      const target = pickerTargetCount();
      const startBtn = document.getElementById('start-btn');
      startBtn.disabled = target === 0;
      startBtn.textContent = target === 0
        ? 'Selecciona una materia'
        : `Comenzar (${target} pregunta${target !== 1 ? 's' : ''})`;
    }

    function showCategoryPicker() {
      const cats = getCategories();

      // Hide progress bar during picker
      document.querySelector('.progress-bar-container').style.display = 'none';

      // Default: all selected
      if (selectedCategories.size === 0) {
        cats.forEach(([cat]) => selectedCategories.add(cat));
      }

      const countOptions = [25, 50, 75, 100, 150, 200];

      document.getElementById('main').innerHTML = `
        <div class="picker">
          <h2>Configura tu examen</h2>

          <div class="field">
            <label class="field-label">Materias</label>
            <div class="dropdown" id="cat-dropdown">
              <button type="button" class="dropdown-toggle" onclick="toggleCatDropdown()">
                <span id="cat-label">Cargando...</span>
                <span class="chevron">&#9662;</span>
              </button>
              <div class="dropdown-panel">
                <label class="dropdown-item">
                  <input type="checkbox" id="cat-all" onchange="selectAllCategories()">
                  <span class="item-label"><strong>Todas las materias</strong></span>
                  <span class="item-count">${flashcards.length}</span>
                </label>
                <div class="dropdown-divider"></div>
                ${cats.map(([cat, count]) => `
                  <label class="dropdown-item">
                    <input type="checkbox" data-cat="${cat.replace(/"/g, '&quot;')}" onchange="toggleCategory('${cat.replace(/'/g, "\\'")}')">
                    <span class="item-label">${cat}</span>
                    <span class="item-count">${count}</span>
                  </label>
                `).join('')}
              </div>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="count-select">Número de preguntas</label>
            <select class="count-select" id="count-select" onchange="onCountChange()">
              ${countOptions.map(n =>
                `<option value="${n}"${n === questionCount ? ' selected' : ''}>${n} preguntas</option>`
              ).join('')}
              <option value="all"${questionCount === 'all' ? ' selected' : ''}>Todas las preguntas</option>
            </select>
          </div>

          <button class="start-btn" id="start-btn" onclick="startQuiz()">Comenzar</button>
        </div>
      `;

      // Close dropdown when clicking outside
      document.addEventListener('click', outsideDropdownClick, true);

      updatePickerUI();
    }

    function outsideDropdownClick(e) {
      const dd = document.getElementById('cat-dropdown');
      if (dd && dd.classList.contains('open') && !dd.contains(e.target)) {
        dd.classList.remove('open');
      }
    }

    // Round-robin stratified sample: shuffle each category's cards, then
    // pick one at a time from each selected category until the target is
    // reached. Guarantees at least one card from every selected category
    // when target >= number of categories.
    function stratifiedSample(pool, targetCount, categoriesInOrder) {
      if (targetCount >= pool.length) return shuffle(pool);

      const buckets = new Map();
      categoriesInOrder.forEach(cat => buckets.set(cat, []));
      pool.forEach(c => {
        if (buckets.has(c.category)) buckets.get(c.category).push(c);
      });
      buckets.forEach((arr, k) => buckets.set(k, shuffle(arr)));

      const cats = [...buckets.keys()].filter(k => buckets.get(k).length > 0);
      const result = [];
      let drew = true;
      while (result.length < targetCount && drew) {
        drew = false;
        for (const cat of cats) {
          if (result.length >= targetCount) break;
          const b = buckets.get(cat);
          if (b.length > 0) {
            result.push(b.pop());
            drew = true;
          }
        }
      }
      return shuffle(result);
    }

    function startQuiz() {
      const filtered = flashcards.filter(c => selectedCategories.has(c.category));
      if (filtered.length === 0) return;

      const target = questionCount === 'all'
        ? filtered.length
        : Math.min(filtered.length, questionCount);

      const selectedInOrder = [...selectedCategories];
      shuffledCards = stratifiedSample(filtered, target, selectedInOrder);

      document.querySelector('.progress-bar-container').style.display = '';
      document.removeEventListener('click', outsideDropdownClick, true);
      currentIndex = 0;
      correctCount = 0;
      missedCards = [];
      answered = false;
      renderCard();
    }

    function updateProgress() {
      const total = shuffledCards.length;
      document.getElementById('progress-text').textContent =
        `Pregunta ${currentIndex + 1} de ${total}`;
      document.getElementById('score-text').textContent =
        `Correctas: ${correctCount}`;
      document.getElementById('progress-fill').style.width =
        `${(currentIndex / total) * 100}%`;
    }

    function renderCard() {
      if (currentIndex >= shuffledCards.length) {
        renderResults();
        return;
      }

      answered = false;
      updateProgress();

      const card = shuffledCards[currentIndex];

      const figuresHtml = card.figures && card.figures.length
        ? `<div class="figures">${card.figures.map(f =>
            `<img src="figures/${encodeURIComponent(f)}" alt="${f}" onclick="openLightbox(this.src)">`
          ).join('')}</div>`
        : '';

      document.getElementById('main').innerHTML = `
        <div class="card">
          <div class="category">${card.category}</div>
          <div class="question">${card.question}</div>
          ${figuresHtml}
          <div class="options" id="options">
            ${card.options.map((opt, i) => `
              <button class="option-btn" data-index="${i}" onclick="selectOption(${i})">
                <span class="option-letter">${letters[i]}</span>
                <span>${opt}</span>
              </button>
            `).join('')}
          </div>
          <div class="feedback" id="feedback"></div>
          <div class="reason" id="reason"></div>
          <div class="pages-ref" id="pages-ref"></div>
          <button class="next-btn" id="next-btn" onclick="nextCard()">
            ${currentIndex < shuffledCards.length - 1 ? 'Siguiente' : 'Ver resultados'}
          </button>
        </div>
      `;
    }

    function selectOption(selected) {
      if (answered) return;
      answered = true;

      const card = shuffledCards[currentIndex];
      const buttons = document.querySelectorAll('.option-btn');
      const feedback = document.getElementById('feedback');
      const nextBtn = document.getElementById('next-btn');

      buttons.forEach(btn => btn.disabled = true);

      const isCorrect = selected === card.answer;

      if (isCorrect) {
        correctCount++;
        buttons[selected].classList.add('correct');
        feedback.className = 'feedback show correct';
        feedback.innerHTML = '&#10003; &#160; &#161;Correcto!';
      } else {
        missedCards.push({ card, selected });
        buttons[selected].classList.add('incorrect');
        buttons[card.answer].classList.add('correct');
        feedback.className = 'feedback show incorrect';
        feedback.innerHTML = `&#10007; &#160; Incorrecto. La respuesta es: ${card.options[card.answer]}`;
      }

      document.getElementById('score-text').textContent =
        `Correctas: ${correctCount}`;

      if (card.reason) {
        const reasonEl = document.getElementById('reason');
        reasonEl.innerHTML = `<div class="reason-label">¿Por qué?</div>${card.reason}`;
        reasonEl.classList.add('show');
      }

      if (card.pages && card.pages.length) {
        const pagesEl = document.getElementById('pages-ref');
        const links = card.pages.map(p =>
          `<a class="page-link" href="pdf-viewer.html?page=${p}" target="_blank">pág. ${p}</a>`
        ).join(' ');
        pagesEl.innerHTML = `<span class="pages-ref-label">Estudiar en el manual:</span> ${links}`;
        pagesEl.classList.add('show');
      }

      nextBtn.classList.add('show');
    }

    function nextCard() {
      currentIndex++;
      renderCard();
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderStudyList() {
      if (missedCards.length === 0) return '';

      // Group missed cards by category and sort categories by miss count (desc)
      const byCat = new Map();
      missedCards.forEach(m => {
        if (!byCat.has(m.card.category)) byCat.set(m.card.category, []);
        byCat.get(m.card.category).push(m);
      });
      const orderedCats = [...byCat.entries()].sort((a, b) => b[1].length - a[1].length);

      const itemsHtml = orderedCats.map(([cat, misses]) => {
        const ref = handbookRef(cat);
        return misses.map(m => {
          const card = m.card;
          const correctText = card.options[card.answer];
          const reasonHtml = card.reason
            ? `<div class="study-reason">${escapeHtml(card.reason)}</div>`
            : '';
          const pageLinks = (card.pages && card.pages.length)
            ? card.pages.map(p =>
                `<a class="page-link" href="pdf-viewer.html?page=${p}" target="_blank">pág. ${p}</a>`
              ).join(' ')
            : '';
          const pageHtml = pageLinks ? ` &mdash; ${pageLinks}` : '';
          const refHtml = ref
            ? `<div class="study-ref"><strong>${escapeHtml(ref.chapterPart)}</strong> &middot; ${escapeHtml(ref.source)}${pageHtml}</div>`
            : '';
          return `
            <div class="study-item">
              <div class="study-topic">${escapeHtml(cat)}</div>
              <div class="study-question">${escapeHtml(card.question)}</div>
              <div class="study-answer">&#10003; ${escapeHtml(correctText)}</div>
              ${reasonHtml}
              ${refHtml}
            </div>
          `;
        }).join('');
      }).join('');

      return `
        <div class="study-list">
          <h3>Temas a estudiar (${missedCards.length})</h3>
          ${itemsHtml}
        </div>
      `;
    }

    function renderResults() {
      const total = shuffledCards.length;
      const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('progress-text').textContent = 'Completado';
      document.getElementById('score-text').textContent =
        `Correctas: ${correctCount}`;

      let emoji = '&#127942;';
      let message = '&#161;Excelente trabajo!';
      if (pct < 50) {
        emoji = '&#128170;';
        message = '&#161;Sigue practicando!';
      } else if (pct < 80) {
        emoji = '&#128077;';
        message = '&#161;Buen esfuerzo!';
      }

      document.getElementById('main').innerHTML = `
        <div class="card results">
          <div class="results-icon">${emoji}</div>
          <h2>${message}</h2>
          <div class="score">${pct}%</div>
          <div class="score-detail">${correctCount} de ${total} respuestas correctas</div>
          <button class="restart-btn" onclick="startQuiz()">Intentar de nuevo</button>
          <button class="restart-btn" style="margin-top:0.75rem;background:var(--card-border);" onclick="showCategoryPicker()">Cambiar materias</button>
          ${renderStudyList()}
        </div>
      `;
    }

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    loadCards();
  </script>
</body>
</html>
